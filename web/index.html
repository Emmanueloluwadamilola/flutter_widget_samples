<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="An interactive catalog of 300+ Flutter widgets with live samples, copy-paste snippets, and teaching notes.">

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Flutter Widget Catalog">
  <meta property="og:title" content="Flutter Widget Catalog">
  <meta property="og:description" content="An interactive catalog of 300+ Flutter widgets with live samples, copy-paste snippets, and teaching notes.">
  <meta property="og:url" content="https://emmanueloluwadamilola.github.io/flutter_widget_samples/">
  <meta property="og:image" content="https://emmanueloluwadamilola.github.io/flutter_widget_samples/icons/Icon-512.png">

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Flutter Widget Catalog">
  <meta name="twitter:description" content="An interactive catalog of 300+ Flutter widgets with live samples, copy-paste snippets, and teaching notes.">
  <meta name="twitter:image" content="https://emmanueloluwadamilola.github.io/flutter_widget_samples/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Flutter Widget Catalog">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Flutter Widget Catalog</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
